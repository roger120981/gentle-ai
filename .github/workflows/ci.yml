name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # 03:00 UTC daily — full Tier 1+2+3 across all platforms as a safety net
    - cron: "0 3 * * *"

jobs:
  go-format:
    name: Go Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: go run ./internal/gofmtcheck

  unit-tests:
    name: Unit Tests
    needs: go-format
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require successful Go format
        if: needs.go-format.result != 'success'
        run: exit 1

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

  windows-runtime:
    name: Windows Runtime
    needs: go-format
    if: always()
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Require successful Go format
        if: needs.go-format.result != 'success'
        run: exit 1

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build native test binary
        shell: pwsh
        run: go build -trimpath -ldflags="-s -w -X main.version=ci" -o "$env:RUNNER_TEMP\gentle-ai.exe" ./cmd/gentle-ai

      - name: Run Windows release-blocker tests
        shell: pwsh
        timeout-minutes: 10
        env:
          GENTLE_AI_TEST_BINARY: ${{ runner.temp }}\gentle-ai.exe
        run: go test -v ./internal/cli ./internal/reviewtransaction ./internal/sddstatus -run '^(TestWindowsSecureOpenRetriesDirectDriveDeviceWithoutWeakeningFlags|TestWindowsSecureOpenDriveFallbackFailsClosed|TestWindowsSecureOpenDoesNotRetryOtherErrors|TestWindowsStoreLockUsesExistingInodeAdvisoryTruth|TestRunGitBoundsLocalAndRemoteCommands|TestRunGitDistinguishesAggregateDeadlineAndTypedExit|TestStoreLockReportsLiveOwnerAndCannotBeStolen|TestStoreLockRecoversCrashAndCorruptOwnerRecords|TestStoreLockIsReleasedWhenOwnerProcessExits|TestConcurrentStoreLockRecoverersCannotBothWin|TestCompactStoresShareRepositoryWriteLock|TestCompactStoreRejectsConcurrentLockedWriter|TestBindingLockRejectsConcurrentWriter|TestReviewFacadeCorrectionFlowResumesFromEachCompactIntermediateState|TestReviewFacadeFinalizeRejectsCorrectionCreatedUntrackedPath|TestRejectFacadeCorrectionUntrackedRespectsStagedProjection|TestMainBinaryAcceptsCorrectedCandidateFromLinkedWorktree|TestWindowsPowerShell51ArtifactManifestFileFinalize)$' -count=1 -timeout=8m

      # PR runs the release-blocker subset only; push to main and the nightly
      # schedule run the full Windows suite, mirroring the E2E tier policy.
      - name: Run full Windows suite
        shell: pwsh
        timeout-minutes: 35
        run: if ($env:GITHUB_EVENT_NAME -eq 'push' -or $env:GITHUB_EVENT_NAME -eq 'schedule') { go test ./... -count=1 -timeout=30m; exit $LASTEXITCODE } else { Write-Host 'Skipping full suite on pull_request; release-blocker tests already ran.' }

  e2e-tests:
    name: E2E Tests (${{ matrix.platform.name }})
    needs: go-format
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu
            dockerfile: Dockerfile.ubuntu
          - name: arch
            dockerfile: Dockerfile.arch
          - name: fedora
            dockerfile: Dockerfile.fedora
    steps:
      - name: Require successful Go format
        if: needs.go-format.result != 'success'
        run: exit 1

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build E2E image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: e2e/${{ matrix.platform.dockerfile }}
          tags: gentle-ai-e2e-${{ matrix.platform.name }}:ci
          load: true
          cache-from: type=gha,scope=e2e-${{ matrix.platform.name }}
          cache-to: type=gha,mode=max,scope=e2e-${{ matrix.platform.name }}

      # PR runs Tier 1 only (binary + dry-run); push to main and the nightly
      # schedule run the full Tier 1+2+3 suite. The ruleset still requires all
      # 3 platform checks, so the matrix runs everywhere — only the test scope
      # changes by event.
      - name: Run E2E tests
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_FULL_E2E: ${{ (github.event_name == 'push' || github.event_name == 'schedule') && '1' || '0' }}
          RUN_BACKUP_TESTS: ${{ (github.event_name == 'push' || github.event_name == 'schedule') && '1' || '0' }}
        run: |
          docker run --rm \
            -e RUN_FULL_E2E \
            -e RUN_BACKUP_TESTS \
            -e GITHUB_TOKEN \
            gentle-ai-e2e-${{ matrix.platform.name }}:ci
